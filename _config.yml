about_content: |
  Cloud Engineer with 4+ years of experience designing, implementing, and supporting cloud infrastructure in AWS environments. Experienced in Infrastructure as Code using Terraform and CloudFormation, container platforms including Kubernetes (EKS) and Docker, CI/CD automation, Linux administration, and cloud networking. Proven ability to build scalable, secure, and highly available infrastructure while improving operational efficiency through automation, monitoring, and performance optimization.

content:
  - title: Projects # Title for the section
    layout: list # Type of content section (list/text)
    content:
      - title: Production Monitoring & Alert Optimization
        layout: top-middle
        quote: >
         Enhanced infrastructure observability and proactive monitoring.
        description: |
         Improved operational visibility by implementing monitoring and logging solutions using Amazon CloudWatch, Grafana, and the ELK Stack. Enhanced alerting capabilities to reduce incident detection time and support faster issue resolution.
      - title: AWS Migration
        layout: top-middle
        quote: >
          Migrated legacy workloads to scalable AWS infrastructure.
        description: |
          Supported the migration of legacy applications to AWS using Amazon EC2 and Amazon RDS. Improved application scalability, reliability, and operational efficiency while assisting with cloud infrastructure deployment and configuration.
      -  title: Infrastructure Automation
         layout: top-middle
         quote: >
           Automated routine infrastructure operations with scripting.
         description: |
           Developed Python and Bash automation scripts for system patching, backup operations, and log management. Reduced manual administrative effort and improved consistency across infrastructure maintenance tasks.

